name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  check:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codigo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: codigo/package-lock.json

      - name: Install dependencies
        # `npm install` (não `npm ci`): o lock pode divergir por versão de npm entre
        # ambientes; para gate de lint/type-check isso reconcilia sem falhar.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint -- --filter=!@brain-master/mobile

      - name: Type check
        run: npm run type-check

  security:
    name: Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codigo

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: codigo/package-lock.json
      - run: npm install --no-audit --no-fund
      - name: Audit dependencies
        # Não-bloqueante: vulnerabilidades são triadas/atualizadas deliberadamente
        # (upgrades transitivos costumam ser breaking). Ver tarefas/em-andamento.md.
        continue-on-error: true
        run: npm audit --audit-level=high
